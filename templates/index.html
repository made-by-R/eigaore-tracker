<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>JARVIS // CONTROL DASHBOARD</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #060B14; color: #E2E8F0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 30px; letter-spacing: 0.05em; }
        .dashboard-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; max-width: 1400px; margin: 0 auto; }
        .panel { background: #0E1726; border: 1px solid rgba(16, 185, 129, 0.15); border-radius: 16px; padding: 30px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        h1, h2, h3 { color: #FFFFFF; margin-top: 0; font-weight: 700; }
        h1 { font-size: 24px; border-bottom: 2px solid #10B981; padding-bottom: 10px; display: flex; align-items: center; gap: 10px; }
        .status-dot { width: 10px; height: 10px; background: #10B981; border-radius: 50%; box-shadow: 0 0 12px #10B981; animation: blink 2s infinite; }
        
        /* 🎤 超巨大ボイスボタン */
        .voice-section { text-align: center; padding: 40px 20px; background: rgba(16, 185, 129, 0.03); border-radius: 12px; border: 1px dashed rgba(16, 185, 129, 0.3); margin-bottom: 30px; }
        .mic-btn { width: 90px; height: 90px; background: linear-gradient(135deg, #10B981, #059669); border: none; border-radius: 50%; color: white; font-size: 32px; cursor: pointer; box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); transition: all 0.3s ease; }
        .mic-btn:hover { transform: scale(1.05); box-shadow: 0 0 35px rgba(16, 185, 129, 0.6); }
        .mic-btn.listening { background: linear-gradient(135deg, #EF4444, #DC2626); box-shadow: 0 0 35px rgba(239, 68, 68, 0.8); animation: pulse 1.5s infinite; }
        
        /* 📜 リアルタイムログ */
        .log-box { background: #070C16; border-radius: 8px; padding: 20px; height: 250px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px; color: #A7F3D0; border: 1px solid rgba(255,255,255,0.05); }
        .log-entry { margin-bottom: 8px; line-height: 1.5; }
        
        /* 🎯 後付け広告エリア */
        .ad-inject-card { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; }
        select, input, button.action-btn { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: #1F2937; color: white; font-size: 14px; margin-top: 10px; box-sizing: border-box; }
        button.action-btn { background: #0055FF; border: none; font-weight: bold; cursor: pointer; box-shadow: 0 4px 14px rgba(0,85,255,0.3); }
        button.action-btn:hover { background: #0044CC; }
        
        @keyframes blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="dashboard-grid">
        <div class="panel">
            <h1><div class="status-dot"></div> JARVIS INTELLIGENT VOICE SYSTEM // MARK 25</h1>
            
            <div class="voice-section">
                <button class="mic-btn" id="micBtn">🎤</button>
                <h3 style="margin-top: 20px;" id="voiceStatus">ボタンを押して、ジャービスに話しかけてください</h3>
                <p style="color: #64748B; font-size: 13px;">「最新トレンドのサイトを作って」「ボタンの色をネオンブルーに変えて」「仮公開して」</p>
            </div>
            
            <h3>🛰️ リアルタイム・システムコンソール</h3>
            <div class="log-box" id="logBox"></div>
        </div>
        
        <div class="panel">
            <h2>🎯 後付け広告装填ポート</h2>
            <p style="color: #94A3B8; font-size: 13px; margin-bottom: 25px;">A8.net等の審査が通過した仮公開サイトへ、後から本物広告をハメ込み、ホーム画面に本公開します。</p>
            
            <div class="ad-inject-card">
                <label style="font-size: 12px; color: #10B981; font-weight: bold;">1. 対象ファイル選択</label>
                <select id="targetFile">
                    {% for file in pending_files %}
                        <option value="{{ file }}">{{ file }}</option>
                    {% endfor %}
                </select>
                
                <label style="font-size: 12px; color: #10B981; font-weight: bold; display:block; margin-top:20px;">2. 本物広告URLを入力</label>
                <input type="text" id="adUrls" placeholder="url, url, url (カンマ区切りで個別装填可能)">
                
                <button class="action-btn" id="injectBtn">🚀 広告をフル装填して本公開</button>
            </div>
        </div>
    </div>

    <script>
        const micBtn = document.getElementById('micBtn');
        const voiceStatus = document.getElementById('voiceStatus');
        const logBox = document.getElementById('logBox');
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = SpeechRecognition ? new SpeechRecognition() : null;
        
        if (recognition) {
            recognition.lang = 'ja-JP';
            recognition.interimResults = false;
            
            micBtn.addEventListener('click', () => {
                if (micBtn.classList.contains('listening')) {
                    recognition.stop();
                } else {
                    micBtn.classList.add('listening');
                    voiceStatus.innerText = "ボスの声を聴いています... お話しください。";
                    recognition.start();
                }
            });
            
            recognition.onresult = async (event) => {
                const commandText = event.results[0][0].transcript;
                micBtn.classList.remove('listening');
                voiceStatus.innerText = "指示を受理しました。解析中...";
                
                const res = await fetch('/api/command', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: commandText })
                });
                const data = await res.json();
                
                const uttr = new SpeechSynthesisUtterance(data.reply);
                uttr.lang = 'ja-JP';
                uttr.rate = 1.1;
                window.speechSynthesis.speak(uttr);
                
                voiceStatus.innerText = "待機中... ボタンを押して指示をどうぞ。";
                updateLogs();
            };
            
            recognition.onerror = () => {
                micBtn.classList.remove('listening');
                voiceStatus.innerText = "エラーが発生しました。もう一度ボタンを押してください。";
            };
            
            recognition.onend = () => {
                micBtn.classList.remove('listening');
            };
        } else {
            voiceStatus.innerText = "お使いのブラウザは音声認識に対応していません。Chromeでお開きください。";
        }
        
        async function updateLogs() {
            const res = await fetch('/api/status');
            const data = await res.json();
            logBox.innerHTML = data.log_stream.map(log => `<div class="log-entry">${log}</div>`).join('');
            logBox.scrollTop = logBox.scrollHeight;
        }
        setInterval(updateLogs, 2000);
        updateLogs();
        
        document.getElementById('injectBtn').addEventListener('click', async () => {
            const file_name = document.getElementById('targetFile').value;
            const ad_urls = document.getElementById('adUrls').value;
            
            if(!file_name || !ad_urls) { alert("ファイルとURLを正しく指定してください、ボス。"); return; }
            
            const res = await fetch('/api/inject_ads', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ file_name, ad_urls })
            });
            const data = await res.json();
            alert(data.msg);
            location.reload();
        });
    </script>
</body>
</html>
